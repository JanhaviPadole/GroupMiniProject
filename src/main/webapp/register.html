<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a192f;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Grid Background */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(52, 152, 219, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(52, 152, 219, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #3498db, transparent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #2ecc71, transparent);
            bottom: -150px;
            left: -100px;
            animation-delay: 5s;
        }

        .orb3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #9b59b6, transparent);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(150px, -100px) scale(1.2);
            }
            66% {
                transform: translate(-100px, 100px) scale(0.8);
            }
        }

        /* Dots pattern */
        .dots {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(52, 152, 219, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: dotsMove 30s linear infinite;
        }

        @keyframes dotsMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 30px 30px;
            }
        }

        /* Digital rain effect */
        .digital-rain {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(transparent, #3498db, transparent);
            animation: rain 8s linear infinite;
        }

        @keyframes rain {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(52, 152, 219, 0.5);
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(52, 152, 219, 0.5);
            }
            50% {
                box-shadow: 0 0 50px rgba(52, 152, 219, 0.8);
            }
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 0 0 30px rgba(52, 152, 219, 0.7);
            font-weight: 700;
            letter-spacing: 2px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        form {
            background: rgba(15, 30, 50, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(52, 152, 219, 0.2);
            animation: slideUp 0.8s ease-out 0.3s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(52, 152, 219, 0.2);
        }

        .form-section:last-of-type {
            border-bottom: none;
        }

        .section-title {
            color: #3498db;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #3498db, #2ecc71);
            border-radius: 2px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #0f1e32;
            color: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, #2980b9, #2471a3);
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3498db;
        }

        .checkbox-wrapper label {
            margin: 0;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:hover {
            box-shadow: 0 12px 30px rgba(52, 152, 219, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            h2 {
                font-size: 1.8rem;
            }

            form {
                padding: 25px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            button {
                padding: 14px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid-background"></div>
    
    <!-- Animated Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <!-- Dots Pattern -->
    <div class="dots"></div>
    
    <!-- Digital Rain Effect -->
    <div class="digital-rain" style="left: 15%; animation-delay: 0s;"></div>
    <div class="digital-rain" style="left: 35%; animation-delay: 2s;"></div>
    <div class="digital-rain" style="left: 55%; animation-delay: 4s;"></div>
    <div class="digital-rain" style="left: 75%; animation-delay: 1s;"></div>
    <div class="digital-rain" style="left: 85%; animation-delay: 3s;"></div>

    <div class="container">
        

        <h2>Bank Account Registration</h2>

        <form action="submitAccountServlet" method="post" enctype="multipart/form-data">
            
            <!-- Personal Information -->
            <div class="form-section">
                <h3 class="section-title">Personal Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="fullName" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="dob" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Gender *</label>
                        <select name="gender" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Marital Status</label>
                        <select name="maritalStatus">
                            <option value="">Select Status</option>
                            <option>Single</option>
                            <option>Married</option>
                            <option>Divorced</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Father/Mother/Spouse Name</label>
                        <input type="text" name="guardianName" placeholder="Enter guardian name">
                    </div>

                    <div class="form-group">
                        <label>Nationality *</label>
                        <input type="text" name="nationality" value="Indian" required>
                    </div>
                </div>
            </div>

            <!-- Contact Information -->
            <div class="form-section">
                <h3 class="section-title">Contact Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Mobile Number *</label>
                        <input type="tel" name="mobile" required placeholder="+91 XXXXX XXXXX">
                    </div>

                    <div class="form-group">
                        <label>Email ID *</label>
                        <input type="email" name="email" required placeholder="your.email@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Permanent Address *</label>
                    <textarea name="permanentAddress" rows="3" required placeholder="Enter your permanent address"></textarea>
                </div>

                <div class="form-group">
                    <label>Current Address</label>
                    <textarea name="currentAddress" rows="3" placeholder="Same as permanent address (if applicable)"></textarea>
                </div>
            </div>

            <!-- Identity Proof -->
            <div class="form-section">
                <h3 class="section-title">Identity Verification</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Aadhaar Number *</label>
                        <input type="text" name="aadhaar" required placeholder="XXXX XXXX XXXX">
                    </div>

                    <div class="form-group">
                        <label>PAN Number *</label>
                        <input type="text" name="pan" required placeholder="ABCDE1234F">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Upload Photograph *</label>
                        <input type="file" name="photo" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label>Upload Signature *</label>
                        <input type="file" name="signature" accept="image/*" required>
                    </div>
                </div>
            </div>

            <!-- Account Details -->
            <div class="form-section">
                <h3 class="section-title">Account Details</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Account Type *</label>
                        <select name="accountType" required>
                            <option value="">Select Account Type</option>
                            <option>Savings</option>
                            <option>Current</option>
                            <option>Salary</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Initial Deposit Amount *</label>
                        <input type="number" name="deposit" required placeholder="Minimum ₹500">
                    </div>
                </div>
            </div>

            <!-- Nominee Details -->
            <div class="form-section">
                <h3 class="section-title">Nominee Details</h3>
                
                <div class="form-group">
                    <label>Nominee Name</label>
                    <input type="text" name="nomineeName" placeholder="Enter nominee name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nominee Relationship</label>
                        <input type="text" name="nomineeRelation" placeholder="e.g., Spouse, Parent, Sibling">
                    </div>

                    <div class="form-group">
                        <label>Nominee Date of Birth</label>
                        <input type="date" name="nomineeDob">
                    </div>
                </div>
            </div>

            <!-- Security Information -->
            <div class="form-section">
                <h3 class="section-title">Security Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Set Username *</label>
                        <input type="text" name="username" required placeholder="Choose a username">
                    </div>

                    <div class="form-group">
                        <label>Set Password *</label>
                        <input type="password" name="password" required placeholder="Create a strong password">
                    </div>
                </div>

                <div class="form-group">
                    <label>Security Question *</label>
                    <select name="securityQuestion" required>
                        <option value="">Select a question</option>
                        <option>What is your pet's name?</option>
                        <option>What is your mother's maiden name?</option>
                        <option>What was your first school?</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Answer *</label>
                    <input type="text" name="securityAnswer" required placeholder="Your answer">
                </div>
            </div>

            <!-- Terms & Conditions -->
            <div class="form-group">
                <div class="checkbox-wrapper">
                    <input type="checkbox" name="terms" id="terms" required>
                    <label for="terms">I agree to the Terms & Conditions and Privacy Policy</label>
                </div>
            </div>

            <button type="submit">Create Account</button>
        </form>
    </div>
</body>
</html>
