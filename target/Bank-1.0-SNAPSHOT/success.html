<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a192f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Grid Background */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(52, 152, 219, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(52, 152, 219, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #2ecc71, transparent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #3498db, transparent);
            bottom: -150px;
            left: -100px;
            animation-delay: 5s;
        }

        .orb3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #27ae60, transparent);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(150px, -100px) scale(1.2);
            }
            66% {
                transform: translate(-100px, 100px) scale(0.8);
            }
        }

        /* Dots pattern */
        .dots {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(46, 204, 113, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: dotsMove 30s linear infinite;
        }

        @keyframes dotsMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 30px 30px;
            }
        }

        /* Digital rain effect */
        .digital-rain {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(transparent, #2ecc71, transparent);
            animation: rain 8s linear infinite;
        }

        @keyframes rain {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Success icon */
        .success-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.6);
            animation: scaleIn 0.6s ease-out 0.3s both, pulse 2s ease-in-out 1s infinite;
            position: relative;
        }

        .success-icon::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 3px solid rgba(46, 204, 113, 0.3);
            animation: ripple 2s ease-out infinite;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 50px rgba(46, 204, 113, 0.6);
            }
            50% {
                box-shadow: 0 0 80px rgba(46, 204, 113, 0.9);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .message {
            background: rgba(46, 204, 113, 0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(46, 204, 113, 0.5);
            display: inline-block;
            padding: 40px 60px;
            border-radius: 20px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(46, 204, 113, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out 0.5s both;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .success-text {
            font-size: 2.5rem;
            color: #2ecc71;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.7);
            animation: slideDown 0.8s ease-out 0.4s both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.7s both;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        a:hover::before {
            width: 300px;
            height: 300px;
        }

        a:hover {
            box-shadow: 0 12px 30px rgba(52, 152, 219, 0.6);
            transform: translateY(-3px);
        }

        a:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Confetti effect */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #2ecc71;
            animation: confettiFall 3s ease-out forwards;
            z-index: 5;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .success-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }

            .success-text {
                font-size: 2rem;
            }

            .message {
                padding: 30px 40px;
                font-size: 1.2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            a {
                padding: 14px 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid-background"></div>
    
    <!-- Animated Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <!-- Dots Pattern -->
    <div class="dots"></div>
    
    <!-- Digital Rain Effect -->
    <div class="digital-rain" style="left: 15%; animation-delay: 0s;"></div>
    <div class="digital-rain" style="left: 35%; animation-delay: 2s;"></div>
    <div class="digital-rain" style="left: 55%; animation-delay: 4s;"></div>
    <div class="digital-rain" style="left: 75%; animation-delay: 1s;"></div>
    <div class="digital-rain" style="left: 85%; animation-delay: 3s;"></div>

    <div class="container">
        <div class="success-icon">✓</div>
        <h1 class="success-text">Success!</h1>
        <div class="message">
            Your account has been successfully registered!
        </div>
        <p class="subtitle">Welcome to SecureBank - Your banking journey starts here</p>
        <a href="index.html">Return to Home</a>
    </div>

    <script>
        // Create confetti effect
        function createConfetti() {
            const colors = ['#2ecc71', '#3498db', '#27ae60', '#2980b9', '#1abc9c'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }
        
        // Trigger confetti on page load
        window.addEventListener('load', createConfetti);
    </script>
</body>
</html>
