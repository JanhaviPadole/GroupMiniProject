<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Failed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a192f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Grid Background */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(231, 76, 60, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(231, 76, 60, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Animated gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #e74c3c, transparent);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #c0392b, transparent);
            bottom: -150px;
            left: -100px;
            animation-delay: 5s;
        }

        .orb3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #e67e22, transparent);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(150px, -100px) scale(1.2);
            }
            66% {
                transform: translate(-100px, 100px) scale(0.8);
            }
        }

        /* Dots pattern */
        .dots {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(231, 76, 60, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: dotsMove 30s linear infinite;
        }

        @keyframes dotsMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 30px 30px;
            }
        }

        /* Digital rain effect */
        .digital-rain {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(transparent, #e74c3c, transparent);
            animation: rain 8s linear infinite;
        }

        @keyframes rain {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error icon */
        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.6);
            animation: shake 0.6s ease-out 0.3s both, pulse 2s ease-in-out 1s infinite;
            position: relative;
        }

        .error-icon::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 3px solid rgba(231, 76, 60, 0.3);
            animation: ripple 2s ease-out infinite;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0) scale(1);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-10px) scale(1.05);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(10px) scale(1.05);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 50px rgba(231, 76, 60, 0.6);
            }
            50% {
                box-shadow: 0 0 80px rgba(231, 76, 60, 0.9);
            }
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .message {
            background: rgba(231, 76, 60, 0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(231, 76, 60, 0.5);
            display: inline-block;
            padding: 40px 60px;
            border-radius: 20px;
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(231, 76, 60, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out 0.5s both;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .error-text {
            font-size: 2.5rem;
            color: #e74c3c;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(231, 76, 60, 0.7);
            animation: slideDown 0.8s ease-out 0.4s both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-out 0.7s both;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        a::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        a:hover::before {
            width: 300px;
            height: 300px;
        }

        a:hover {
            box-shadow: 0 12px 30px rgba(231, 76, 60, 0.6);
            transform: translateY(-3px);
        }

        a:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Secondary button */
        .secondary-link {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
            margin-left: 15px;
        }

        .secondary-link:hover {
            box-shadow: 0 12px 30px rgba(52, 152, 219, 0.6);
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .error-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }

            .error-text {
                font-size: 2rem;
            }

            .message {
                padding: 30px 40px;
                font-size: 1.2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            a {
                padding: 14px 32px;
                font-size: 1rem;
                margin: 10px 5px;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            .secondary-link {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid-background"></div>
    
    <!-- Animated Orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <!-- Dots Pattern -->
    <div class="dots"></div>
    
    <!-- Digital Rain Effect -->
    <div class="digital-rain" style="left: 15%; animation-delay: 0s;"></div>
    <div class="digital-rain" style="left: 35%; animation-delay: 2s;"></div>
    <div class="digital-rain" style="left: 55%; animation-delay: 4s;"></div>
    <div class="digital-rain" style="left: 75%; animation-delay: 1s;"></div>
    <div class="digital-rain" style="left: 85%; animation-delay: 3s;"></div>

    <div class="container">
        <div class="error-icon">✕</div>
        <h1 class="error-text">Oops!</h1>
        <div class="message">
            Something went wrong. Please try again.
        </div>
        <p class="subtitle">Don't worry - we're here to help you complete your registration</p>
        
        <div class="button-group">
            <a href="register.html">Try Again</a>
            <a href="index.html" class="secondary-link">Return to Home</a>
        </div>
    </div>
</body>
</html>
